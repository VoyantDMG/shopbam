<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ShopBAM</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    .cart-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .cart-item {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cart-item-img { width: 56px; height: 56px; border-radius: 10px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .cart-item-store { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; }
    .cart-item-price { font-size: 15px; font-weight: 600; color: var(--brand); }
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border); background: var(--bg-secondary); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; }
    .qty-btn:hover { background: var(--brand-light); color: var(--brand); }
    .qty-val { font-size: 14px; font-weight: 500; min-width: 16px; text-align: center; }
    .cart-footer { padding: 16px; background: var(--bg-primary); border-top: 0.5px solid var(--border); position: sticky; bottom: 64px; }
    .cart-total-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 15px; }
    .cart-total-row strong { font-weight: 600; }
    .checkout-btn { width: 100%; padding: 14px; background: var(--brand); color: #fff; font-size: 15px; font-weight: 500; font-family: var(--font-body); border: none; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; }
    .checkout-btn:hover { background: var(--brand-dark); }
    .empty-cart { text-align: center; padding: 60px 24px; color: var(--text-tertiary); }
    .empty-cart-emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-cart-text { font-size: 15px; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
    .empty-cart-sub { font-size: 13px; color: var(--text-secondary); }
    .shop-link { display: inline-block; margin-top: 16px; padding: 10px 24px; background: var(--brand); color: #fff; border-radius: 20px; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="page-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="page-title">Your Cart</div>
  </header>

  <div id="cartContent"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="pages/search.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="pages/map.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Map</span>
    </a>
    <a href="cart.html" class="nav-item active">
      <span class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nav-badge">0</span>
      </span>
      <span>Cart</span>
    </a>
    <a href="pages/profile.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById('cartContent');
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-cart-emoji">🛒</div>
            <div class="empty-cart-text">Your cart is empty</div>
            <div class="empty-cart-sub">Discover local products from stores near you</div>
            <a href="index.html" class="shop-link">Browse stores</a>
          </div>`;
        return;
      }
      const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
      const fee = (total * 0.05).toFixed(2);
      const grand = (total + parseFloat(fee)).toFixed(2);

      container.innerHTML = `
        <div class="cart-list" id="cartList"></div>
        <div class="cart-footer">
          <div class="cart-total-row"><span>Subtotal</span><span>$${total.toFixed(2)}</span></div>
          <div class="cart-total-row" style="color:var(--text-secondary);font-size:13px;"><span>Service fee (5%)</span><span>$${fee}</span></div>
          <div class="cart-total-row" style="border-top:0.5px solid var(--border);padding-top:12px;margin-top:4px;"><span><strong>Total</strong></span><span><strong>$${grand}</strong></span></div>
          <button class="checkout-btn" onclick="alert('Checkout coming soon! Stripe Connect integration required.')">Proceed to Checkout</button>
        </div>`;

      const list = document.getElementById('cartList');
      cart.forEach(item => {
        const el = document.createElement('div');
        el.className = 'cart-item';
        el.innerHTML = `
          <div class="cart-item-img" style="background:${item.imgBg}">${item.emoji}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-store">${item.store}</div>
            <div class="cart-item-price">$${item.price}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" data-id="${item.id}" data-action="dec">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" data-id="${item.id}" data-action="inc">+</button>
          </div>`;
        list.appendChild(el);
      });

      list.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = parseInt(btn.dataset.id);
          const idx = cart.findIndex(i => i.id === id);
          if (idx === -1) return;
          if (btn.dataset.action === 'inc') {
            cart[idx].qty += 1;
          } else {
            cart[idx].qty -= 1;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
          }
          saveCart();
          renderCart();
          updateCartBadge();
        });
      });
    }

    updateCartBadge();
    renderCart();
  </script>
</body>
</html>
