<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopBAM — Shop Brick & Mortar</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="logo">Shop<span>BAM</span></div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search local products, stores..." />
    </div>
    <button class="loc-pill" onclick="alert('Location picker coming soon!')">
      <span class="loc-dot"></span>
      Austin, TX
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    </button>
    <button class="cart-btn" onclick="openPage('cart.html')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-count">3</span>
    </button>
  </header>

  <!-- Hero Banner -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Your neighborhood,<br /><em>delivered.</em></h1>
      <p class="hero-sub">Shop 14 local stores · 2,400+ products near you</p>
    </div>
    <div class="hero-art">
      <div class="hero-circle c1"></div>
      <div class="hero-circle c2"></div>
      <div class="hero-circle c3"></div>
    </div>
  </section>

  <!-- Category Filter -->
  <div class="cat-bar">
    <div class="cats" id="catList">
      <button class="cat active" data-cat="all">All</button>
      <button class="cat" data-cat="clothing">Clothing</button>
      <button class="cat" data-cat="food">Food & Drink</button>
      <button class="cat" data-cat="home">Home Goods</button>
      <button class="cat" data-cat="books">Books</button>
      <button class="cat" data-cat="beauty">Beauty</button>
      <button class="cat" data-cat="hardware">Hardware</button>
    </div>
  </div>

  <main class="main">

    <!-- Nearby Stores -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Stores near you</h2>
        <a href="pages/stores.html" class="see-all">See all →</a>
      </div>
      <div class="stores-row" id="storesRow">
        <!-- injected by JS -->
      </div>
    </section>

    <!-- Map Banner -->
    <a href="pages/map.html" class="map-banner">
      <div class="map-banner-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </div>
      <div class="map-banner-text">
        <strong>Explore the map</strong>
        <span>Browse stores by neighborhood</span>
      </div>
      <div class="map-banner-arrow">›</div>
    </a>

    <!-- Products Grid -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Products nearby</h2>
        <a href="pages/products.html" class="see-all">See all →</a>
      </div>
      <div class="products-grid" id="productsGrid">
        <!-- injected by JS -->
      </div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="pages/search.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="pages/map.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Map</span>
    </a>
    <a href="cart.html" class="nav-item">
      <span class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nav-badge">3</span>
      </span>
      <span>Cart</span>
    </a>
    <a href="pages/profile.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
