<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — ShopBAM</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="page-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="search-wrap" style="flex:1;">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" style="width:14px;height:14px;color:var(--text-tertiary);flex-shrink:0;">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search products, stores..." autofocus />
    </div>
  </header>

  <div class="cat-bar">
    <div class="cats" id="catList">
      <button class="cat active" data-cat="all">All</button>
      <button class="cat" data-cat="clothing">Clothing</button>
      <button class="cat" data-cat="food">Food & Drink</button>
      <button class="cat" data-cat="home">Home Goods</button>
      <button class="cat" data-cat="books">Books</button>
      <button class="cat" data-cat="beauty">Beauty</button>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title" id="resultLabel">All products</div>
    </div>
    <div class="products-grid" id="resultsGrid"></div>
  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="search.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="map.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Map</span>
    </a>
    <a href="../cart.html" class="nav-item">
      <span class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nav-badge">0</span>
      </span>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../js/data.js"></script>
  <script>
    let activeCategory = 'all';
    let searchQuery = '';

    function renderResults() {
      const grid = document.getElementById('resultsGrid');
      const label = document.getElementById('resultLabel');
      grid.innerHTML = '';

      let results = PRODUCTS;
      if (activeCategory !== 'all') results = results.filter(p => p.category === activeCategory);
      if (searchQuery) results = results.filter(p =>
        p.name.toLowerCase().includes(searchQuery) ||
        p.store.toLowerCase().includes(searchQuery)
      );

      label.textContent = searchQuery ? `Results for "${searchQuery}"` : activeCategory === 'all' ? 'All products' : activeCategory;

      if (results.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:14px;">No products found</div>`;
        return;
      }

      results.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'prod-card';
        card.innerHTML = `
          <div class="prod-img" style="background:${prod.imgBg}">${prod.emoji}</div>
          <div class="prod-info">
            <div class="prod-name">${prod.name}</div>
            <div class="prod-store">${prod.store}</div>
            <div class="prod-bottom">
              <div class="prod-price-wrap">
                <div class="prod-price">$${prod.price}</div>
                <div class="prod-dist">${prod.distance}</div>
              </div>
              <button class="add-btn" data-id="${prod.id}">+</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });

      grid.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => addToCart(parseInt(btn.dataset.id)));
      });
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase().trim();
      renderResults();
    });

    document.getElementById('catList').addEventListener('click', e => {
      const btn = e.target.closest('.cat');
      if (!btn) return;
      document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderResults();
    });

    updateCartBadge();
    renderResults();
  </script>
</body>
</html>
