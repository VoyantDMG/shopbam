<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map — ShopBAM</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    .map-placeholder { background: var(--bg-secondary); margin: 16px; border-radius: var(--radius-lg); border: 0.5px solid var(--border); height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .map-pin { font-size: 40px; }
    .map-placeholder-text { font-size: 14px; font-weight: 500; }
    .map-placeholder-sub { font-size: 12px; color: var(--text-secondary); text-align: center; max-width: 240px; }
    .store-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
    .store-list-item { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; transition: box-shadow 0.15s; }
    .store-list-item:hover { box-shadow: var(--shadow-md); }
    .store-list-avatar { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .store-list-info { flex: 1; }
    .store-list-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .store-list-cat { font-size: 12px; color: var(--text-tertiary); }
    .store-list-dist { font-size: 13px; color: var(--brand); font-weight: 500; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="../index.html" class="page-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="page-title">Map</div>
  </header>

  <div class="map-placeholder">
    <div class="map-pin">🗺️</div>
    <div class="map-placeholder-text">Map view</div>
    <div class="map-placeholder-sub">Integrate Google Maps or Mapbox API to show stores near you</div>
  </div>

  <div style="padding: 0 16px 12px;">
    <div class="section-title">All nearby stores</div>
  </div>
  <div class="store-list" id="storeList"></div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="search.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="map.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Map</span>
    </a>
    <a href="../cart.html" class="nav-item">
      <span class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nav-badge">0</span>
      </span>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../js/data.js"></script>
  <script>
    const list = document.getElementById('storeList');
    STORES.forEach(store => {
      const el = document.createElement('a');
      el.className = 'store-list-item';
      el.href = `store.html?id=${store.id}`;
      el.innerHTML = `
        <div class="store-list-avatar" style="background:${store.avatarBg}">${store.emoji}</div>
        <div class="store-list-info">
          <div class="store-list-name">${store.name}</div>
          <div class="store-list-cat">${store.categoryLabel}</div>
        </div>
        <div class="store-list-dist">${store.distance}</div>`;
      list.appendChild(el);
    });
    updateCartBadge();
  </script>
</body>
</html>
